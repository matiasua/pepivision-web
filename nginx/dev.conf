# Local development reverse proxy: publishes the app at http://localhost:8080
# and proxies to the `web` service, with Upgrade/Connection headers so the
# Next.js hot-reload WebSocket survives the proxy. No TLS in development.
# Docker's embedded DNS server. Combined with a variable in proxy_pass below,
# this forces nginx to re-resolve `web` on each request instead of caching
# its IP for the container's lifetime — otherwise, whenever `web` is rebuilt
# and recreated (a new IP), nginx keeps proxying to the old, now-dead
# address until nginx itself is restarted.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name localhost;

    set $web_upstream http://web:3000;

    location / {
        proxy_pass $web_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}
