name: pepivision360

networks:
  pepivision-dev:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  web_node_modules:
  e2e_node_modules:

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      PORT: "3000"
      # Bind-mounted source on macOS/Windows Docker Desktop doesn't reliably
      # deliver native fs-change events into the container (see Fase 1
      # notes) — polling makes Next.js's dev watcher work regardless of host.
      WATCHPACK_POLLING: "true"
      # Least-privilege application role (DML only), not the Postgres
      # bootstrap superuser — see the `db-init` service and
      # db/init-app-role.sql. Only `migrate` (DDL) uses the superuser
      # DATABASE_URL.
      DATABASE_URL: ${DATABASE_URL_APP}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      EMAIL_ASSET_BASE_URL: ${EMAIL_ASSET_BASE_URL}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE}
      PRIVATE_OBJECT_STORAGE_BUCKET: ${PRIVATE_OBJECT_STORAGE_BUCKET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS}
      DKIM_DOMAIN_NAME: ${DKIM_DOMAIN_NAME}
      DKIM_KEY_SELECTOR: ${DKIM_KEY_SELECTOR}
      DKIM_PRIVATE_KEY: ${DKIM_PRIVATE_KEY}
    # No ports published to the host on purpose: only `nginx` reaches `web`,
    # over the internal network, on its internal port 3000.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - pepivision-dev
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  postgres:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pepivision-dev

  # Runs Prisma migrations against `postgres`. In Fase 1 there is no
  # schema.prisma yet (that lands in Fase 2), so `npm run migrate` is a
  # no-op placeholder that exits 0 without pretending to migrate anything —
  # this only proves the one-shot job wiring (depends_on, no restart) works.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: ["npm", "run", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pepivision-dev
    restart: "no"

  # One-shot: provisions/updates the least-privilege app role `web` connects
  # as (see db/init-app-role.sql) — DML only, no DDL, no superuser. Runs
  # after `migrate` so its catch-all grant on existing tables covers
  # everything `migrate` just created; `ALTER DEFAULT PRIVILEGES` in the
  # script also covers tables created by any *future* `migrate` run, so this
  # doesn't need to be sequenced again after that. Connects as the Postgres
  # bootstrap superuser (POSTGRES_USER) purely to grant/manage the app role —
  # that superuser is never in `web`'s own environment.
  db-init:
    image: postgres:16.4-alpine
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: ${POSTGRES_DB}
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db/init-app-role.sql:/sql/init-app-role.sql:ro
    command:
      - psql
      - -v
      - ON_ERROR_STOP=1
      - -v
      - app_user=${APP_DB_USER}
      - -v
      - app_password=${APP_DB_PASSWORD}
      - -v
      - pg_database=${POSTGRES_DB}
      - -v
      - pg_owner=${POSTGRES_USER}
      - -f
      - /sql/init-app-role.sql
    networks:
      - pepivision-dev
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - pepivision-dev

  # One-shot: waits for minio, creates the app's buckets if missing, exits.
  # Two buckets: the public product-photo one (anonymous read, unchanged)
  # and a private one for sensitive request attachments (prescriptions) —
  # deliberately no `mc anonymous set download` on that one, ever.
  minio-init:
    image: minio/mc:RELEASE.2024-10-29T15-34-59Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      PRIVATE_OBJECT_STORAGE_BUCKET: ${PRIVATE_OBJECT_STORAGE_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\" &&
      (mc mb local/\"$$OBJECT_STORAGE_BUCKET\" || true) &&
      mc anonymous set download local/\"$$OBJECT_STORAGE_BUCKET\" &&
      mc ls local/\"$$OBJECT_STORAGE_BUCKET\" &&
      (mc mb local/\"$$PRIVATE_OBJECT_STORAGE_BUCKET\" || true) &&
      mc anonymous set none local/\"$$PRIVATE_OBJECT_STORAGE_BUCKET\" &&
      mc ls local/\"$$PRIVATE_OBJECT_STORAGE_BUCKET\" &&
      echo 'buckets ready'
      "
    networks:
      - pepivision-dev
    restart: "no"

  mailpit:
    image: axllent/mailpit:v1.20
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    networks:
      - pepivision-dev

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      web:
        condition: service_healthy
    networks:
      - pepivision-dev

  # Playwright end-to-end tests, against the real stack via `nginx`. Never
  # starts with a plain `docker compose up` — only with
  # `docker compose --profile e2e run --rm e2e` (or `--project e2e up`).
  # Uses DATABASE_URL_APP (the least-privilege app role, see db-init) for
  # its own global-setup/teardown fixtures — DML only, no DDL, same as `web`.
  e2e:
    profiles: ["e2e"]
    build:
      context: .
      dockerfile: Dockerfile.e2e
    working_dir: /app
    ipc: host # recommended by the official Playwright image for Chromium stability
    environment:
      NODE_ENV: test
      CI: ${CI:-}
      PLAYWRIGHT_BASE_URL: http://nginx
      # Lighthouse CI (chrome-launcher) doesn't know about Playwright's own
      # bundled Chromium unless told explicitly — same browser install the
      # Dockerfile.e2e image already has, no separate download needed.
      CHROME_PATH: /ms-playwright/chromium-1228/chrome-linux/chrome
      DATABASE_URL: ${DATABASE_URL_APP}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      EMAIL_ASSET_BASE_URL: ${EMAIL_ASSET_BASE_URL}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT}
      OBJECT_STORAGE_PUBLIC_URL: ${OBJECT_STORAGE_PUBLIC_URL}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET}
      OBJECT_STORAGE_ACCESS_KEY: ${OBJECT_STORAGE_ACCESS_KEY}
      OBJECT_STORAGE_SECRET_KEY: ${OBJECT_STORAGE_SECRET_KEY}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE}
      PRIVATE_OBJECT_STORAGE_BUCKET: ${PRIVATE_OBJECT_STORAGE_BUCKET}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS}
      DKIM_DOMAIN_NAME: ${DKIM_DOMAIN_NAME}
      DKIM_KEY_SELECTOR: ${DKIM_KEY_SELECTOR}
      DKIM_PRIVATE_KEY: ${DKIM_PRIVATE_KEY}
    volumes:
      - ./:/app
      - e2e_node_modules:/app/node_modules
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    depends_on:
      nginx:
        condition: service_started
      web:
        condition: service_healthy
    networks:
      - pepivision-dev

  # Optional DB explorer. Never starts with a plain `docker compose up`;
  # only with `docker compose --profile tools up adminer`.
  adminer:
    image: adminer:4.8.1
    profiles: ["tools"]
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - postgres
    networks:
      - pepivision-dev
